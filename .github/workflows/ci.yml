name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '17 4 * * 1' # weekly: catches toolchain and dependency drift

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install clang-format==18.1.8
      - run: git ls-files '*.hpp' '*.cpp' ':!third_party/**' | xargs clang-format --dry-run -Werror

  vendored:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./tools/update_vendored.sh && git diff --exit-code third_party/

  build-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: gcc, cxx: g++ }
          - { name: clang, cxx: clang++ }
    name: build-test (${{ matrix.name }})
    runs-on: ubuntu-latest
    env:
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libblosc-dev
      # Pinned conformance track: the PR gate uses a fixed zarr-python
      # (3.x writes both v2 and v3 fixtures).
      - run: pip install zarr==3.2.1 numcodecs numpy
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DLIBZARR_WITH_ZLIB=ON -DLIBZARR_WITH_BLOSC=ON
      - run: cmake --build build -j
      - run: ctest --test-dir build --output-on-failure

  # Old-generation writer coverage: zarr-python 2.x fixtures must stay readable.
  conformance-zarr2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install zarr==2.18.3 numcodecs numpy
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DLIBZARR_WITH_ZLIB=ON
      - run: cmake --build build -j
      - run: ctest --test-dir build -R conformance --output-on-failure

  fuzz:
    runs-on: ubuntu-latest
    env:
      CXX: clang++
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DLIBZARR_BUILD_FUZZERS=ON -DLIBZARR_WITH_ZLIB=ON
      - run: cmake --build build --target fuzz_metadata fuzz_shard_index fuzz_zip -j
      - run: ./build/fuzz_metadata -max_total_time=60 fuzz/corpus/metadata
      - run: ./build/fuzz_shard_index -max_total_time=60 fuzz/corpus/shard_index
      - run: ./build/fuzz_zip -max_total_time=60 fuzz/corpus/zip

  sanitize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DLIBZARR_WITH_ZLIB=ON
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all"
      - run: cmake --build build -j
      - run: ctest --test-dir build --output-on-failure

  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install clang-tidy==18.1.8
      - run: cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DLIBZARR_WITH_ZLIB=ON
      - run: cmake --build build -j # generates standalone-header TUs
      - run: >
          clang-tidy -p build --quiet
          $(find build/standalone -name '*.cpp') tests/*.cpp examples/*.cpp

  # Docs are machine-checked or they don't exist: undocumented public symbols
  # fail this job.
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y doxygen
      - run: mkdir -p build/docs && doxygen Doxyfile

  # The amalgamated single header must stay generatable and compilable.
  amalgamation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 tools/amalgamate.py build/zarr.hpp
      - run: |
          printf '#include "zarr.hpp"\nint main() { zarr::MemoryStore s; return 0; }\n' > build/t.cpp
          g++ -std=c++17 -Wall -Wextra -Werror -Ibuild -Ithird_party build/t.cpp -o build/t && ./build/t

  # The WASM gate: the zero-dependency core must compile under Emscripten and
  # the tests must pass under node. Required check — WASM compatibility is a
  # core constraint, not a feature.
  emscripten:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
      - run: emcmake cmake -S . -B em-build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build em-build -j
      - run: ctest --test-dir em-build --output-on-failure
