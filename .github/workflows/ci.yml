name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '17 4 * * 1' # weekly: catches toolchain and dependency drift

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install clang-format==18.1.8
      - run: git ls-files '*.hpp' '*.cpp' ':!third_party/**' | xargs clang-format --dry-run -Werror

  vendored:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./tools/update_vendored.sh && git diff --exit-code third_party/

  build-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: gcc, cxx: g++ }
          - { name: clang, cxx: clang++ }
    name: build-test (${{ matrix.name }})
    runs-on: ubuntu-latest
    env:
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libblosc-dev libzstd-dev
      # Pinned conformance track: the PR gate uses a fixed zarr-python
      # (3.x writes both v2 and v3 fixtures).
      - run: pip install zarr==3.2.1 numcodecs numpy
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DLIBZARR_WITH_ZLIB=ON -DLIBZARR_WITH_BLOSC=ON -DLIBZARR_WITH_ZSTD=ON
      - run: cmake --build build -j
      - run: ctest --test-dir build --output-on-failure

  # Old-generation writer coverage: zarr-python 2.x fixtures must stay readable.
  conformance-zarr2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install zarr==2.18.3 numcodecs numpy
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DLIBZARR_WITH_ZLIB=ON
      - run: cmake --build build -j
      - run: ctest --test-dir build -R conformance --output-on-failure

  fuzz:
    runs-on: ubuntu-latest
    env:
      CXX: clang++
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DLIBZARR_BUILD_FUZZERS=ON -DLIBZARR_WITH_ZLIB=ON
      - run: cmake --build build --target fuzz_metadata fuzz_shard_index fuzz_zip -j
      - run: python3 fuzz/gen_seeds.py build/fuzz_corpus
      - run: ./build/fuzz_metadata -max_total_time=60 build/fuzz_corpus/metadata
      - run: ./build/fuzz_shard_index -max_total_time=60 build/fuzz_corpus/shard_index
      - run: ./build/fuzz_zip -max_total_time=60 build/fuzz_corpus/zip

  sanitize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DLIBZARR_WITH_ZLIB=ON
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all"
      - run: cmake --build build -j
      - run: ctest --test-dir build --output-on-failure

  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install clang-tidy==18.1.8
      - run: sudo apt-get update && sudo apt-get install -y libzstd-dev
      - run: cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DLIBZARR_WITH_ZLIB=ON -DLIBZARR_WITH_ZSTD=ON
      - run: cmake --build build -j # generates standalone-header TUs
      - run: >
          clang-tidy -p build --quiet
          $(find build/standalone -name '*.cpp') tests/*.cpp examples/*.cpp

  # Line-coverage floor for the public headers: guards against a PR that adds
  # code without exercising it. 85%% is below the current ~89%% (uncovered lines
  # are mostly error-message branches); raise it as coverage improves.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libblosc-dev libzstd-dev
      - run: pip install gcovr==8.6
      - run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
          -DLIBZARR_WITH_ZLIB=ON -DLIBZARR_WITH_BLOSC=ON -DLIBZARR_WITH_ZSTD=ON
          -DCMAKE_CXX_FLAGS="--coverage -O0" -DCMAKE_EXE_LINKER_FLAGS="--coverage"
      - run: cmake --build build --target libzarr_tests -j
      - run: ctest --test-dir build -R libzarr_tests --output-on-failure
      - run: gcovr --root . --filter 'include/libzarr/' build --txt --fail-under-line 85

  # Docs are machine-checked or they don't exist: undocumented public symbols
  # fail this job.
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y doxygen
      - run: mkdir -p build/docs && doxygen Doxyfile

  # The public API surface is machine-checked: regenerate docs/API.md from the
  # headers and fail if it changed uncommitted. Any add/remove/signature change
  # to a public symbol must land with its API.md update, the way the 1.0
  # freeze contract requires (see docs/COMPATIBILITY.md).
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y clang # clang builtin headers
      - run: pip install libclang==18.1.1
      - run: python3 tools/api_inventory.py
      - run: git diff --exit-code docs/API.md

  # The amalgamated single header must stay generatable and compilable.
  amalgamation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 tools/amalgamate.py build/zarr.hpp
      - run: |
          printf '#include "zarr.hpp"\nint main() { zarr::MemoryStore s; return 0; }\n' > build/t.cpp
          g++ -std=c++17 -Wall -Wextra -Werror -Ibuild -Ithird_party build/t.cpp -o build/t && ./build/t

  # The installed CMake package must be consumable by a downstream project via
  # find_package(libzarr CONFIG) — the contract the vcpkg port depends on. Each
  # config installs to a throwaway prefix and builds a standalone consumer
  # against it (see tests/packaging/), exercising the codec dependency re-wiring.
  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y zlib1g-dev libzstd-dev libblosc-dev
      - run: bash tests/packaging/run_packaging_test.sh . "${RUNNER_TEMP}/pkg-min"
      - run: bash tests/packaging/run_packaging_test.sh . "${RUNNER_TEMP}/pkg-zlib" -DLIBZARR_WITH_ZLIB=ON
      - run: bash tests/packaging/run_packaging_test.sh . "${RUNNER_TEMP}/pkg-zstd" -DLIBZARR_WITH_ZSTD=ON
      - run: bash tests/packaging/run_packaging_test.sh . "${RUNNER_TEMP}/pkg-blosc" -DLIBZARR_WITH_BLOSC=ON

  # The WASM gate: the zero-dependency core must compile under Emscripten and
  # the tests must pass under node. Required check — WASM compatibility is a
  # core constraint, not a feature.
  emscripten:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
      - run: emcmake cmake -S . -B em-build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build em-build -j
      - run: ctest --test-dir em-build --output-on-failure

  # The config real WASM consumers use: Emscripten + gzip (zlib via the
  # -sUSE_ZLIB port). Guards the WASM+codec path against silent regression;
  # the zero-dep `emscripten` job above still guards the minimal core.
  emscripten-zlib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
      - run: emcmake cmake -S . -B em-build -DCMAKE_BUILD_TYPE=Release -DLIBZARR_WITH_ZLIB=ON
      - run: cmake --build em-build -j
      - run: ctest --test-dir em-build --output-on-failure
