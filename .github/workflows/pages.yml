name: pages

# Publishes the Doxygen API documentation to GitHub Pages. The CI `docs` job
# already gates that the docs build warning-free; this deploys the HTML.
#
# Runs only when the published content can change (headers, markdown docs,
# Doxyfile). GitHub Pages permits one deployment at a time, so limiting the
# trigger keeps back-to-back pushes from queuing colliding deploys; unrelated
# code/test/CI commits don't redeploy the site.
on:
  push:
    branches: [main]
    paths:
      - 'include/**'
      - '**/*.md'
      - 'docs/**'
      - 'Doxyfile'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deployment at a time; don't cancel a running publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y doxygen
      - run: mkdir -p build/docs && doxygen Doxyfile
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
