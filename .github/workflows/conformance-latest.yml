# The second conformance track: latest released zarr-python, weekly. The PR
# gate pins zarr-python; this job exists to catch upstream drift early. A
# failure here files work, it does not block PRs.
name: conformance-latest

on:
  schedule:
    - cron: '43 5 * * 1'
  workflow_dispatch:

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libblosc-dev libzstd-dev
      - run: pip install zarr numcodecs numpy # latest, deliberately unpinned
      - run: pip show zarr | head -2
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DLIBZARR_WITH_ZLIB=ON -DLIBZARR_WITH_BLOSC=ON -DLIBZARR_WITH_ZSTD=ON
      - run: cmake --build build -j
      - run: ctest --test-dir build -R conformance --output-on-failure

  # Weekly long fuzz runs (the PR gate only fuzzes for 60s per harness).
  fuzz-long:
    runs-on: ubuntu-latest
    env:
      CXX: clang++
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build -DLIBZARR_BUILD_FUZZERS=ON -DLIBZARR_WITH_ZLIB=ON
      - run: cmake --build build --target fuzz_metadata fuzz_shard_index fuzz_zip -j
      - run: python3 fuzz/gen_seeds.py build/fuzz_corpus
      - run: ./build/fuzz_metadata -max_total_time=900 build/fuzz_corpus/metadata
      - run: ./build/fuzz_shard_index -max_total_time=900 build/fuzz_corpus/shard_index
      - run: ./build/fuzz_zip -max_total_time=900 build/fuzz_corpus/zip
